<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Orleans Saints</title>

    <style>

        /* Page styling */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            text-align: center;
        }

        /* Navigation */
        nav {
            background: #000;
            padding: 15px;
        }

            nav a {
                color: white;
                text-decoration: none;
                margin: 20px;
                font-weight: bold;
            }

        /* Slider */
        #slider {
            overflow: hidden;
            width: 100%;
        }

            #slider figure {
                position: relative;
                width: 300%;
                margin: 0;
                left: 0;
                animation: 15s slider infinite;
            }

                #slider figure img {
                    width: 33.33%;
                    float: left;
                    height: 600px; /* adjust this */
                    object-fit: cover;
                }

        /* Animation */
        @keyframes slider {

            0% {
                left: 0;
            }

            30% {
                left: 0;
            }

            35% {
                left: -100%;
            }

            60% {
                left: -100%;
            }

            75% {
                left: -200%;
            }

            90% {
                left: -200%;
            }

            100% {
                left: 0%;
            }

        }

        /* Footer */
        footer {
            margin-top: 40px;
            padding: 20px;
            background: #eee;
        }
    </style>

</head>

<body>

                <img src="https://s.yimg.com/ny/api/res/1.2/I0lApQ9CbfDeRVIsHuEDbg--/YXBwaWQ9aGlnaGxhbmRlcjt3PTY0MDtoPTQyNztjZj13ZWJw/https://media.zenfs.com/en/sb_nation_articles_115/c55e07942beb18f000a27cb42e48c9a1">
                <img src="https://media-cdn.socastsrm.com/wordpress/wp-content/blogs.dir/3859/files/2025/10/saints-secondary.jpg">
            </figure>
        </div>

    </main>
