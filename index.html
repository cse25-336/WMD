<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Orleans Saints</title>

    <style>

        /* Page styling */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            text-align: center;
        }

        /* Navigation */
        nav {
            background: #000;
            padding: 15px;
        }

            nav a {
                color: white;
                text-decoration: none;
                margin: 20px;
                font-weight: bold;
            }
        <style >
        /* Slider frame (visible area) */
        #slider {
            overflow: hidden;
            width: 100%;
        }

        /* Long strip holding all images */
        #slider figure {
            position: relative;
            width: 500%; /* 5 images */
            margin: 0;
            left: 0;
            animation: 15s slider infinite;
        }

            /* Each image */
            #slider figure img {
                width: 20%; /* 100 / 5 */
                float: left;
                height: 600px;
                object-fit: cover;
            }

        /* Animation */
        @keyframes slider {
            0%, 10% {
                left: 0;
            }

            20%, 30% {
                left: -100%;
            }

            40%, 50% {
                left: -200%;
            }

            60%, 70% {
                left: -300%;
            }

            80%, 90% {
                left: -400%;
            }

            100% {
                left: 0;
            }
        }

        /* Basic page styling */
        body {
            margin: 0;
            font-family: Arial;
        }

        header {
            text-align: center;
            padding: 20px;
        }

        nav a {
            margin: 0 10px;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <header>
        <h1>NEW ORLEANS SAINTS</h1>
        <p>The best casual sports wear.</p>

        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Merchandise</a>
        </nav>
    </header>

    <div id="slider">
        <figure>
            <img src="https://media-cdn.socastsrm.com/wordpress/wp-content/blogs.dir/3859/files/2025/10/saints-secondary.jpg">
            <img src="https://wallpapers.com/images/featured/new-orleans-saints-pictures-hmenx6zwbf36wbyy.jpg">
            <img src="https://static.nike.com/a/images/w_1200,h_1200,c_fill,f_auto/5949f680-8aeb-4fe0-85e5-2aefbf778eb2/image.jpg">
            <img src="https://gsp-image-cdn.wmsports.io/cms/prod/bleacher-report/ap_images/e2d4a8afc8bc4a479dc461fe6f1da9b3/Saints_Panthers_Football_55381_4000x2250_(0,285).jpg">
            <img src="https://cloudfront-us-east-1.images.arcpublishing.com/bostonglobe/PWSFGWLQFYNZCTLWKEE6ARXB7U.jpg">
        </figure>
    </div>

</body>
