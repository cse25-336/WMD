            font-family: Arial, sans-serif;

        nav {

            nav a {

                margin: 20px;
                font-weight: bold;
            }

        /* Slider */
        #slider {
            overflow: hidden;
            width: 100%;
        }

            #slider figure {
                position: relative;
                width: 300%;
                margin: 0;
                left: 0;
                animation: 15s slider infinite;
            }

                #slider figure img {
                    width: 33.33%;
                    float: left;
                    height: 600px; /* adjust this */
                    object-fit: cover;
                }

        /* Animation */
        @keyframes slider {

            0% {
                left: 0;
            }

            30% {
                left: 0;
            }

            35% {
                left: -100%;
            }

            60% {
                left: -100%;
            }

            75% {
                left: -200%;
            }

            80% {
                left: -200%;
            }

            90% {
                left: -300%;
            }

            100% {
                left: -300%

        }

        /* Footer */
        footer {
            margin-top: 40px;
            padding: 20px;
            background: #eee;
        }
    </style>
