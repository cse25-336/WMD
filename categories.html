<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>New Orleans Saints</title>  
 
     
    <style>
        /* Slider frame (visible area) */
        #slider {
            overflow: hidden;
            width: 100%;
        }

        /* Long strip holding all images */
        #slider figure {
            position: relative;
            width: 500%; /* 5 images */
            margin: 0;
            left: 0;
            animation: 15s slider infinite;
        }

        /* Each image */
        #slider figure img {
            width: 20%; /* 100 / 5 */
            float: left;
            height: 600px;
            object-fit: cover;
        }

        /* Animation - Fixed keyframe values for smooth infinite loop */
        @keyframes slider {
            0% {
                left: 0;
            }
            10% {
                left: 0;
            }
            20% {
                left: -100%;
            }
            30% {
                left: -100%;
            }
            40% {
                left: -200%;
            }
            50% {
                left: -200%;
            }
            60% {
                left: -300%;
            }
            70% {
                left: -300%;
            }
            80% {
                left: -400%;
            }
            90% {
                left: -400%;
            }
            100% {
                left: 0;
            }
        }

        /* Basic page styling to match original intent */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            text-align: center;
        }

        h1 {
            margin: 20px 0;
        }
 nav {
            background: #000;
            padding: 10px;
        }

            nav a {
                color: white;
                text-decoration: none;
                margin:0 10px;
                font-weight: bold;
            }
       

        .category-container {
            display: flex;
            justify-content: center;
            gap: 100px;
            margin: 40px 20px;
        }

        
        .category-block img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 8px;
        }

        .category-block h2 {
            margin-top: 10px;
        }
    </style>
</head>
<body>

                <img src="https://cloudfront-us-east-1.images.arcpublishing.com/bostonglobe/PWSFGWLQFYNZCTLWKEE6ARXB7U.jpg" alt="Saints players">
