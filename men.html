    <style>

        <style >
        /* Slider frame (visible area) */
        #slider {
            overflow: hidden;
            width: 100%;
        }

        /* Long strip holding all images */
        #slider figure {
            position: relative;
            width: 500%; /* 5 images */
            margin: 0;
            left: 0;
            animation: 15s slider infinite;
        }

            /* Each image */
            #slider figure img {
                width: 20%; /* 100 / 5 */
                float: left;
                height: 600px;
                object-fit: contain;
            }

        /* Animation */
        @keyframes slider {
            0%, 10% {
                left: 0;
            }

            20%, 30% {
                left: -100%;
            }

            40%, 50% {
                left: -200%;
            }

            60%, 70% {
                left: -300%;
            }

            80%, 90% {
                left: -400%;
            }

            100% {
                left: 0;
            }
        }

        /* Basic page styling */
        body {
            margin: 0;
            font-family: Arial;
        }

        header {
            text-align: center;
            padding: 20px;
        }

        nav a {
            margin: 0 10px;
            text-decoration: none;
        }
    </style>
</head>
